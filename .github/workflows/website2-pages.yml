name: Deploy Website 2.0 to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install render dependency
        run: python -m pip install --upgrade pip pyyaml

      - name: Render static site
        working-directory: sapho-native
        env:
          SAPHO_SITE_MODE: github-pages
          SAPHO_SITE_CUSTOM_DOMAIN: research.quiznat.com
          SAPHO_SITE_BASE_URL: https://research.quiznat.com
        run: python scripts/render_site.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sapho-native/public/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
